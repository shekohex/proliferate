name: Stable Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 0.2.0) — will be tagged as v0.2.0"
        required: true
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version_tag: ${{ steps.resolve.outputs.version_tag }}
    steps:
      - name: Resolve version tag
        id: resolve
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ inputs.version }}"
            # Strip leading v if provided
            VERSION="${VERSION#v}"
            echo "version_tag=v${VERSION}" >> "$GITHUB_OUTPUT"
          else
            echo "version_tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

  tag:
    needs: prepare
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create git tag
        env:
          VERSION_TAG: ${{ needs.prepare.outputs.version_tag }}
        run: |
          set -euo pipefail
          git tag -f "$VERSION_TAG"
          git push origin "$VERSION_TAG" --force

  build-and-push:
    needs: [prepare, tag]
    if: always() && needs.prepare.result == 'success' && (needs.tag.result == 'success' || needs.tag.result == 'skipped')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        include:
          - name: web
            dockerfile: apps/web/Dockerfile
            context: .
          - name: gateway
            dockerfile: apps/gateway/Dockerfile
            context: .
          - name: worker
            dockerfile: apps/worker/Dockerfile
            context: .
          - name: llm-proxy
            dockerfile: apps/llm-proxy/Dockerfile
            context: ./apps/llm-proxy
          - name: trigger-service
            dockerfile: apps/trigger-service/Dockerfile
            context: .

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/${{ matrix.name }}:${{ needs.prepare.outputs.version_tag }}
            ${{ env.IMAGE_PREFIX }}/${{ matrix.name }}:latest
          cache-from: type=gha,scope=stable-${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=stable-${{ matrix.name }}

  create-release:
    needs: [prepare, build-and-push]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        env:
          VERSION_TAG: ${{ needs.prepare.outputs.version_tag }}
        run: |
          set -euo pipefail

          # Find previous stable tag (v*)
          PREV_TAG=$(git tag --list 'v*' --sort=-version:refname | grep -v "$VERSION_TAG" | head -n1)

          if [[ -n "$PREV_TAG" ]]; then
            CHANGELOG=$(git log "${PREV_TAG}..HEAD" --pretty=format:"- %s (%h)" --no-merges)
          else
            CHANGELOG=$(git log --pretty=format:"- %s (%h)" --no-merges -50)
          fi

          echo "$CHANGELOG" > /tmp/changelog.md

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION_TAG: ${{ needs.prepare.outputs.version_tag }}
        run: |
          set -euo pipefail

          # Delete existing release if re-running
          gh release delete "$VERSION_TAG" --yes 2>/dev/null || true

          gh release create "$VERSION_TAG" \
            --title "$VERSION_TAG" \
            --notes-file /tmp/changelog.md \
            --latest
